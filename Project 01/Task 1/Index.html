<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Webpage</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f4f4;
      }

      .container {
        width: 80%;
        margin: 50px auto;
        text-align: center;
      }

      h1 {
        color: #333;
        margin-bottom: 20px;
      }

      p {
        font-size: 18px;
        color: #555;
        margin-bottom: 20px;
        line-height: 1.6;
      }

      img {
        width: 200px;
        border-radius: 10px;
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Welcome to My Webpage</h1>

      <p>
        This is a simple webpage created using HTML and CSS. It contains a
        heading, a paragraph, and an image.
      </p>

      <img src="https://cognifyz.com/wp-content/uploads/2025/09/Untitled-design-22.webp" alt="Sample Image" />
    </div>
  </body>
</html>
